# Integration Test Profile - uses Testcontainers PostgreSQL
# Datasource configured dynamically via @DynamicPropertySource

# JPA - use create-drop since Liquibase changelogs live in the sboot module
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Liquibase - disabled (changelogs are in sboot module, not on backend test classpath)
spring.liquibase.enabled=false

# JWT
jwt.secret=test-secret-key-must-be-at-least-32-characters-long-for-testing
jwt.expiration=3600000

# Billing
billing.costs.EXPORT=5
billing.costs.CHAT_MESSAGE=1
billing.costs.LINKEDIN_DRAFT=3
billing.costs.LINKEDIN_SUGGESTION=2
billing.costs.RESUME_EXPORT=10
billing.costs.COVER_LETTER_EXPORT=10
billing.costs.BACKGROUND_DECK_EXPORT=15
billing.costs.SLUG_CHANGE=5
billing.free-tier.chat-messages-per-month=50
billing.free-tier.linkedin-drafts-per-month=10
billing.retry.max-attempts=3
billing.retry.backoff-ms=100

# AI - uses mock LlmClient in tests (no real provider needed)
ai.default-provider=openai
ai.openai.api-key=test-key
ai.openai.chat-model=gpt-4o-mini
ai.openai.embedding-model=text-embedding-3-small
ai.openai.base-url=https://api.openai.com/v1
# Ollama disabled in tests (no base-url set)
# ai.ollama.base-url=

# Exports
exports.storage-path=./test-exports
exports.retry.max-attempts=3
exports.retry.initial-delay-ms=100
exports.retry.multiplier=2

# Test cleanup
test.cleanup.api-key=test-cleanup-key

# Logging
logging.level.com.interviewme=DEBUG
logging.level.org.testcontainers=INFO
