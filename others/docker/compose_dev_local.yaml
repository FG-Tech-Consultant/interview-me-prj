services:

  interview-me-db:
    image: pgvector/pgvector:pg16
    container_name: interview_me_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgresql/init-database.sh:/docker-entrypoint-initdb.d/init-database.sh
      - pg_data_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data_local:
    driver: local
