services:
  db:
    image: pgvector/pgvector:pg18
    container_name: interview-me-prod-db
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-interview_me}
    ports:
      - "${IM_PROD_PG_PORT:-5433}:5432"
    volumes:
      - interview-me-prod-pg-data:/var/lib/postgresql
      - ./others/docker/postgresql/init-database.sh:/docker-entrypoint-initdb.d/init-database.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prod-network

  app:
    image: interview-me:${IM_APP_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interview-me-prod-app
    restart: always
    mem_limit: 1024m
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      JAVA_TOOL_OPTIONS: -Xms256m -Xmx768m
      DATABASE_URL: jdbc:postgresql://db:5432/${DATABASE_NAME:-interview_me}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-must-be-at-least-32-characters-long-for-HS256}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      AI_DEFAULT_PROVIDER: openai
      OPENAI_API_KEY: not-needed
      OPENAI_BASE_URL: http://host.docker.internal:8000/v1
      OPENAI_CHAT_MODEL: claude-sonnet-4
      GEMINI_API_KEY: ""
      CLAUDE_API_KEY: ""
      OLLAMA_BASE_URL: http://interview-me-ollama:11434
      OLLAMA_CHAT_MODEL: qwen2.5:3b
      AI_EMBEDDING_PROVIDER: ollama
    ports:
      - "8080:8080"
    volumes:
      - /var/opt/interview-me-prj/logs_prod:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - prod-network
      - ollama_default

volumes:
  interview-me-prod-pg-data:
    driver: local

networks:
  prod-network:
    driver: bridge
  ollama_default:
    external: true
