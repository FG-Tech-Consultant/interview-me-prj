services:

  interview-me-db:
    image: pgvector/pgvector:pg18
    container_name: interview-me-dev-db
    restart: always
    environment:
      - POSTGRES_USER=${IM_PG_USER:-postgres}
      - POSTGRES_PASSWORD=${IM_PG_PASSWORD:-postgres}
      - POSTGRES_DB=${IM_PG_DB:-interview_me}
    ports:
      - "127.0.0.1:${IM_PG_PORT:-5432}:5432"
    volumes:
      - ./postgresql/init-database.sh:/docker-entrypoint-initdb.d/init-database.sh
      - interview-me-dev-pg-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-network

  interview-me-app:
    image: interview-me:${IM_APP_VERSION:-latest}
    container_name: interview-me-dev-app
    restart: always
    mem_limit: 1024m
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      interview-me-db:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=${IM_PROFILE:-prod}
      - JAVA_TOOL_OPTIONS=-Xms256m -Xmx768m
      - SPRING_DATASOURCE_URL=jdbc:postgresql://interview-me-db:5432/${IM_PG_DB:-interview_me}
      - SPRING_DATASOURCE_USERNAME=${IM_PG_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${IM_PG_PASSWORD:-postgres}
      - JWT_SECRET=${IM_JWT_SECRET:-your-256-bit-secret-must-be-at-least-32-characters-long-for-HS256}
      - JWT_EXPIRATION_MS=${IM_JWT_EXPIRATION_MS:-86400000}
      - AI_DEFAULT_PROVIDER=${IM_AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${IM_OPENAI_API_KEY:-not-needed}
      - OPENAI_BASE_URL=${IM_OPENAI_BASE_URL:-http://host.docker.internal:3457/v1}
      - OPENAI_CHAT_MODEL=${IM_OPENAI_CHAT_MODEL:-claude-sonnet-4}
      - GEMINI_API_KEY=${IM_GEMINI_API_KEY:-}
      - CLAUDE_API_KEY=${IM_CLAUDE_API_KEY:-}
      - OLLAMA_BASE_URL=${IM_OLLAMA_BASE_URL:-http://interview-me-ollama:11434}
      - OLLAMA_CHAT_MODEL=${IM_OLLAMA_CHAT_MODEL:-qwen2.5:7b}
      - AI_EMBEDDING_PROVIDER=${IM_EMBEDDING_PROVIDER:-ollama}
      - TEST_CLEANUP_API_KEY=${IM_TEST_CLEANUP_API_KEY:-test-cleanup-secret-key-dev}
      - MAIL_USERNAME=${IM_MAIL_USERNAME:-}
      - MAIL_PASSWORD=${IM_MAIL_PASSWORD:-}
      - NOTIFICATION_EMAIL_ENABLED=${IM_NOTIFICATION_EMAIL_ENABLED:-false}
      - NOTIFICATION_BASE_URL=${IM_NOTIFICATION_BASE_URL:-http://localhost:8081}
    ports:
      - "8081:8080"
    volumes:
      - /var/opt/interview-me-prj/logs_dev:/app/logs
    networks:
      - dev-network
      - ollama_default

volumes:
  interview-me-dev-pg-data:
    driver: local

networks:
  dev-network:
    driver: bridge
  ollama_default:
    external: true
